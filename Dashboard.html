<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - BoostifyX</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h2>Dashboard</h2>

<a href="deposit.html" class="btn">Deposit</a>

</header>


<section class="dashboard">

<div class="card">

<h3>Welcome</h3>

<p id="userEmail"></p>

<p>User ID: <span id="userId"></span></p>

<p>Balance: ₹<span id="balance"></span></p>

</div>


<div class="card">

<h3>Notifications</h3>

<ul id="notifications"></ul>

</div>


<div class="card">

<h3>Order Service</h3>

<select id="serviceSelect"></select>

<input type="text" id="link" placeholder="Enter Public Link">

<input type="number" id="quantity" placeholder="Quantity">

<p>Total Price: ₹<span id="price">0</span></p>

<button onclick="placeOrder()">Place Order</button>

</div>


<div class="card">

<h3>Order History</h3>

<ul id="orders"></ul>

</div>

</section>


<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


let currentUser;
let userData;
let services=[];


// CHECK LOGIN
onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

currentUser=user;

document.getElementById("userEmail").innerText=user.email;

const userRef=doc(db,"users",user.uid);

const userSnap=await getDoc(userRef);

userData=userSnap.data();

document.getElementById("userId").innerText=userData.userid;

document.getElementById("balance").innerText=userData.balance;

loadServices();
loadOrders();
loadNotifications();

});


// LOAD SERVICES
async function loadServices(){

const snapshot=await getDocs(collection(db,"services"));

const select=document.getElementById("serviceSelect");

snapshot.forEach(docSnap=>{

const service=docSnap.data();

services.push(service);

const option=document.createElement("option");

option.value=services.length-1;

option.text=service.name+" (₹"+service.rate+"/1k)";

select.appendChild(option);

});

}


// PRICE CALCULATION
document.getElementById("quantity").oninput=()=>{

const service=services[document.getElementById("serviceSelect").value];

const qty=document.getElementById("quantity").value;

if(service && qty){

const price=(service.rate/1000)*qty;

document.getElementById("price").innerText=price.toFixed(2);

}

};


// PLACE ORDER
async function placeOrder(){

const service=services[document.getElementById("serviceSelect").value];

const link=document.getElementById("link").value;

const quantity=document.getElementById("quantity").value;

const price=(service.rate/1000)*quantity;

if(userData.balance<price){

window.location.href="deposit.html";
return;

}

await addDoc(collection(db,"orders"),{

userId:userData.userid,
service:service.name,
link:link,
quantity:quantity,
price:price,
buyingPrice:service.buyingPrice,
profit:price-service.buyingPrice,
status:"pending",
date:new Date()

});

alert("Order placed");

location.reload();

}


// LOAD ORDERS
async function loadOrders(){

const q=query(collection(db,"orders"),where("userId","==",userData.userid));

const snapshot=await getDocs(q);

const list=document.getElementById("orders");

snapshot.forEach(docSnap=>{

const order=docSnap.data();

const li=document.createElement("li");

li.innerText=order.service+" - "+order.status;

list.appendChild(li);

});

}


// LOAD NOTIFICATIONS
async function loadNotifications(){

const q=query(collection(db,"notifications"),where("userId","==",userData.userid));

const snapshot=await getDocs(q);

const list=document.getElementById("notifications");

snapshot.forEach(docSnap=>{

const note=docSnap.data();

const li=document.createElement("li");

li.innerText=note.message;

list.appendChild(li);

});

}


window.placeOrder=placeOrder;

</script>

</body>
  </html>
