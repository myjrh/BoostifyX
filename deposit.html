<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit - BoostifyX</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">
<h2>Deposit Funds</h2>
<a href="dashboard.html" class="btn">Back</a>
</header>


<section class="dashboard">

<div class="card">

<h3>Add Balance</h3>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="payNow()">Pay Now</button>

<button onclick="generateQR()">Generate QR</button>

<div id="qrBox"></div>

<button onclick="confirmPayment()">I Have Paid</button>

<p id="msg"></p>

</div>

</section>


<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
collection,
addDoc,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


let currentUser;
let userData;


// CHECK LOGIN
onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

currentUser=user;

const userRef=doc(db,"users",user.uid);

const snap=await getDoc(userRef);

userData=snap.data();

});


// PAY NOW (UPI LINK)
function payNow(){

const amount=document.getElementById("amount").value;

if(!amount){

alert("Enter amount");
return;

}

const upi=`upi://pay?pa=9019123302@fam&pn=Imran&am=${amount}&cu=INR`;

window.location.href=upi;

}


// GENERATE QR
function generateQR(){

const amount=document.getElementById("amount").value;

if(!amount){

alert("Enter amount");
return;

}

const upi=`upi://pay?pa=9019123302@fam&pn=Imran&am=${amount}&cu=INR`;

const qr=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upi)}`;

document.getElementById("qrBox").innerHTML=`<img src="${qr}">`;

}


// CONFIRM PAYMENT
async function confirmPayment(){

const amount=document.getElementById("amount").value;

if(!amount){

alert("Enter amount");
return;

}

await addDoc(collection(db,"deposits"),{

userId:userData.userid,
amount:Number(amount),
status:"pending",
date:new Date()

});

document.getElementById("msg").innerText="Deposit request submitted";

}


window.payNow=payNow;
window.generateQR=generateQR;
window.confirmPayment=confirmPayment;

</script>

</body>
</html>
